[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "franklinwh"
version = "0.1.0"
description = "FranklinWH Cloud API client library"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx",
    "jsonschema",
]

[project.scripts]
franklinwh-cli = "franklinwh.cli:main"

[tool.setuptools.packages.find]
include = ["franklinwh*"]
