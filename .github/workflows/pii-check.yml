name: PII Scanner
on:
  push:
    branches: [main, feat/*, bug/*]
  pull_request:

jobs:
  check-pii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run PII Scanner
        run: python3 scripts/check_pii.py --scan
