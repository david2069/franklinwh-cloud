site_name: FranklinWH Cloud
site_description: Unofficial Python library & CLI for the FranklinWH energy management system
site_url: https://david2069.github.io/franklinwh-cloud
repo_url: https://github.com/david2069/franklinwh-cloud
repo_name: david2069/franklinwh-cloud

theme:
  name: material
  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Python Environment Setup: HOWTO_PYTHON.md
    - Installation: getting-started.md
    - Sandbox Setup: SANDBOX_SETUP.md
  - Guides:
    - API Cookbook: API_COOKBOOK.md
    - API Reference: API_REFERENCE.md
    - API Endpoint Mapping: API_ENDPOINTS_MAPPING.md
    - MQTT Command Catalog: MQTT_CMD_CATALOG.md
    - Operating Modes Guide: OPERATING_MODES_GUIDE.md
    - TOU Schedule Guide: TOU_SCHEDULE_GUIDE.md
    - TOU Tariff Reference: TOU_TARIFF_REFERENCE.md
    - Scheduling Nettest: SCHEDULING.md
    - Logging Strategy: LOGGING.md
    - Telemetry & Privacy: TELEMETRY.md
    - Serial Numbers Format: SERIAL_NUMBERS.md
  - CLI:
    - Raw API Methods: cli-raw.md
  - Device Discovery:
    - Payload Strategies (Agent Warning): DISCOVER_VS_SUPPORT.md
    - Implementation Plan: DISCOVER_IMPLEMENTATION_PLAN.md
    - Device Catalog Design: DEVICE_CATALOG_DESIGN.md
    - API Field Registry: API_FIELD_REGISTRY.md
  - Troubleshooting:
    - Guide: TROUBLESHOOTING.md
    - Region Quirks & Accessory Behaviour: REGION_QUIRKS.md
    - WiFi DHCP Failure: troubleshooting/2026-03-21_wifi_dhcp_failure.md
  - Thank You: thank-you.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/david2069/franklinwh-cloud
